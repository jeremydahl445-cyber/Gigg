<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Myles</title>
<style>
  *, *::before, *::after { box-sizing: border-box; }
  
  html, body { 
    margin: 0; 
    padding: 0;
    width: 100%;
    min-height: 100vh;
    overflow-x: hidden; 
    overflow-y: auto; 
  }
html, body {
  height: 100%;
  margin: 0;
}

body {

  background: url("55a47e7e92a6616ffefc18cf5157fcd24e55179a5bcb82884c7d28a52218ec3a24767f620d3512135169fe67f5048493a256d289e3c00d9f9efee7_1280") no-repeat center center / cover;
  font-family: Arial, sans-serif;
}

  }
  .canvas {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(4, calc((100vw - 40px) / 3 * 0.75));
    gap: 10px;
    padding: 10px;
    width: 100vw;
    min-height: 100vh;
  }
  #cell-bottomright { position: relative; display: flex; flex-direction: column; border-radius: 12px; }
  
  #dragImg { 
    width: 100%; height: 100%; object-fit: cover; border-radius: 12px; 
    box-shadow: 0 4px 18px rgba(0,0,0,0.35); cursor: grab; position: relative; z-index: 10; 
  }
  #dragImg.dragging { cursor: grabbing; box-shadow: 0 12px 40px rgba(0,0,0,0.55); position: fixed; z-index: 9999; }
  
  #secretBox { 
    display: none; position: absolute; inset: 0; align-items: center; justify-content: center; 
    background: rgba(0,0,0,0.45); backdrop-filter: blur(6px); border-radius: 12px; z-index: 5; 
  }
  #secretBox.visible { display: flex; }

  #secretInput { 
    background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.35); 
    border-radius: 10px; color: white; padding: 10px 16px; width: 80%; text-align: center; outline: none; 
  }
  .canvas img.grid-img { width: 100%; height: 100%; object-fit: cover; object-position: center center; border-radius: 12px; box-shadow: 0 4px 18px rgba(0,0,0,0.35); }
  
  @keyframes rainbowCycle {
    0%   { filter: hue-rotate(0deg)   saturate(5) brightness(1.2) drop-shadow(0 0 15px white); }
    100% { filter: hue-rotate(360deg) saturate(5) brightness(1.2) drop-shadow(0 0 15px white); }
  }
  @keyframes spinChicken {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }
</style>
</head>
<body>
  <div class="canvas">
    <img class="grid-img" src="arlo.png" alt="Arlo">
    <img class="grid-img" src="BDOGREAL.JPEG" alt="Butterdog">
    <img class="grid-img" src="arlo.gif" alt="Arlo gif">
    <img class="grid-img" src="BDOGS2.JPEG" alt="B Dogs">
    <img class="grid-img" src="MADDIE.JPEG" alt="Maddie">
    <img class="grid-img" src="CHICKEN.JPEG" alt="Chicken">
    <img class="grid-img" src="COOPER.JPEG" alt="Cooper">
    <img class="grid-img" src="BENCAT1.JPEG" alt="Ben Cat 1" style="object-position: center bottom;">
    <img class="grid-img" src="BENCAT2.JPEG" alt="Ben Cat 2" style="object-position: center center;">
    <img class="grid-img" src="BENDOG.JPEG" alt="Ben Dog" style="object-position: center center;">
    <div id="cell-bottomright">
      <div id="secretBox">
        <input id="secretInput" type="text" placeholder="enter code..." autocomplete="off" />
      </div>
      <img id="dragImg" src="EVANDOGREAL.JPEG" alt="Evan Dog">
    </div>
  </div>

  <script>
    const dragImg = document.getElementById("dragImg");
    const secretBox = document.getElementById("secretBox");
    const secretInput = document.getElementById("secretInput");
    let isDragging = false;
    let startX, startY;

    dragImg.addEventListener("mousedown", (e) => {
      e.preventDefault();
      isDragging = true;
      const rect = dragImg.getBoundingClientRect();
      startX = e.clientX - rect.left;
      startY = e.clientY - rect.top;
      dragImg.style.width = rect.width + "px";
      dragImg.style.height = rect.height + "px";
      dragImg.classList.add("dragging");
      secretBox.classList.add("visible");
    });

    document.addEventListener("mousemove", (e) => {
      if (!isDragging) return;
      dragImg.style.left = (e.clientX - startX) + "px";
      dragImg.style.top = (e.clientY - startY) + "px";
    });

    document.addEventListener("mouseup", () => {
      isDragging = false;
      dragImg.classList.remove("dragging");
    });

    secretInput.addEventListener("keydown", (e) => {
      if (e.key !== "Enter") return;
      const val = secretInput.value.toLowerCase().trim();
      secretInput.value = "";
      
      if (val === "mylesquantiscute") {
        const allImages = document.querySelectorAll("img");
        allImages.forEach((img) => {
          if (img.alt === "Cooper") {
            img.src = "Quant and Yahu.png";
            img.style.objectPosition = "center 20%";
          } else {
            img.src = "Screenshot 2025-11-11 195523.png";
            img.style.objectPosition = "center center";
          }
        });
      }
      
      if (val === "evilmyles") {
        document.body.innerHTML = `<div style="position:fixed;inset:0;z-index:99999;background:url('Screenshot 2025-11-11 195523.png') no-repeat center center / cover;"><div style="position:absolute;inset:0;background:rgba(180,0,0,0.55);mix-blend-mode:multiply;"></div></div>`;
      }

      if (val === "washee") {
        const washeeImg = document.createElement("img");
        washeeImg.src = "Mr._Washee_Washee.webp";
        washeeImg.style.position = "absolute";
        washeeImg.style.zIndex = "10000";
        
        let currentWidth = 200;
        const roll = Math.random(); 
        if (roll <= 0.01) { 
          currentWidth = 500;
          washeeImg.style.animation = "rainbowCycle 2s linear infinite";
        } else if (roll <= (0.01 + (1/15))) { 
          currentWidth = 250;
          washeeImg.style.filter = "sepia(1) saturate(10) hue-rotate(15deg) brightness(1.1) drop-shadow(0 0 10px gold)";
        } else {
          currentWidth = 200;
        }
        washeeImg.style.width = currentWidth + "px";
        const maxX = window.innerWidth - currentWidth;
        const maxY = window.innerHeight - currentWidth;
        washeeImg.style.left = Math.max(0, Math.floor(Math.random() * maxX)) + "px";
        washeeImg.style.top = Math.max(0, Math.floor(Math.random() * maxY) + window.scrollY) + "px";
        document.body.appendChild(washeeImg);
      }

      if (val === "lucaschicken") {
        const chickenImg = document.createElement("img");
        chickenImg.src = "CHICKEN-removebg-preview.png";
        chickenImg.style.position = "absolute";
        chickenImg.style.zIndex = "10000";
        
        let size = 400;
        const roll = Math.random();
        
        // 1/500: Platinum Chicken (2000px, Silver/Shiny)
        if (roll <= (1 / 500)) {
          size = 2000;
          chickenImg.style.filter = "grayscale(1) brightness(1.6) contrast(1.2) drop-shadow(0 0 30px rgba(255,255,255,0.9))";
        } 
        else if (roll <= (1 / 150)) {
          size = 1200;
          chickenImg.style.animation = "spinChicken 1s linear infinite";
        } 
        else if (roll <= (1 / 100)) {
          size = 1000;
          chickenImg.style.animation = "rainbowCycle 3s linear infinite";
        } 
        else if (roll <= (1 / 15)) {
          size = 500;
          chickenImg.style.filter = "sepia(1) saturate(10) hue-rotate(15deg) brightness(1.1) drop-shadow(0 0 10px gold)";
        } 
        else {
          size = 400;
        }

        chickenImg.style.width = size + "px";
        const maxX = window.innerWidth - size;
        const maxY = window.innerHeight - size;
        chickenImg.style.left = Math.max(0, Math.floor(Math.random() * maxX)) + "px";
        chickenImg.style.top = Math.max(0, Math.floor(Math.random() * maxY) + window.scrollY) + "px";
        document.body.appendChild(chickenImg);
      }
    });
  </script>
</body>
</html>
