<!doctype html>
<html lang="en">
<head>
<script type="text/javascript">
    (function(c,l,a,r,i,t,y){
        c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
        t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
        y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
    })(window, document, "clarity", "script", "uexksjkj4q");
</script>
<meta charset="utf-8" />
<link rel="icon" type="image/x-icon" href="favicon.ico">
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Myles</title>

<style>
  *, *::before, *::after { box-sizing: border-box; }

  html, body {
    margin: 0;
    height: 100%;
    overflow: hidden;
  }

  body {
    background: url("images/55a47e7e92a6616ffefc18cf5157fcd24e55179a5bcb82884c7d28a52218ec3a24767f620d3512135169fe67f5048493a256d289e3c00d9f9efee7_1280.jpg") 
                no-repeat center center fixed;
    background-size: cover;
    font-family: Arial, sans-serif;
  }

  /* 3x3 grid that fills the viewport */
  .canvas {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(3, 1fr);
    gap: 10px;
    padding: 10px;
    width: 100vw;
    height: 100vh;
  }

  .canvas img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 12px;
    display: block;
    box-shadow: 0 4px 18px rgba(0,0,0,0.35);
  }

  /* BUTTON STYLES */
  #openGameBtn, #openGameBtn2 {
    position: fixed;
    right: 30px;
    background: rgba(255, 255, 255, 0.15);
    color: white;
    padding: 14px 28px;
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 16px;
    backdrop-filter: blur(12px);
    font-size: 18px;
    cursor: pointer;
    transition: 0.25s ease;
    z-index: 500;
  }

  #openGameBtn  { bottom: 30px; }
  #openGameBtn2 { bottom: 90px; }

  #openGameBtn:hover,
  #openGameBtn2:hover {
    background: rgba(255, 255, 255, 0.28);
  }

  /* MODAL */
  .iframeModal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(4px);
    z-index: 1000;
  }

  .iframe-container {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 90%;
    height: 85%;
    background: #000;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 0 25px rgba(0,0,0,0.5);
  }

  .iframe-container iframe {
    width: 100%;
    height: 100%;
    border: none;
  }

  .closeModal {
    position: absolute;
    top: 20px;
    right: 30px;
    font-size: 40px;
    color: white;
    cursor: pointer;
    font-weight: bold;
    z-index: 1100;
    user-select: none;
  }

  .closeModal:hover { color: #ddd; }
</style>
</head>

<body>

  <div class="canvas">
    <img src="arlo.png"        alt="Arlo">
    <img src="BUTTERDOG.JPEG"  alt="Butterdog">
    <img src="arlo.gif"        alt="Arlo gif">
    <img src="BDOGS2.JPEG"     alt="B Dogs">
    <img src="MADDIE.JPEG"     alt="Maddie">
    <img src="CHICKEN.JPEG"    alt="Chicken">
    <img src="COOPER.JPEG"     alt="Cooper">
    <img src="EVANDOG.JPEG"    alt="Evan Dog">
    <!-- 9th cell left intentionally empty or add another photo -->
    <div></div>
  </div>

  <!-- Buttons -->
  <button id="openGameBtn">Blackjack</button>
  <button id="openGameBtn2">Racing Game</button>

  <!-- Modal 1 -->
  <div id="iframeModal1" class="iframeModal">
    <div class="closeModal" id="closeModal1">&times;</div>
    <div class="iframe-container">
      <iframe src="https://zv1y2i8p.play.gamezop.com/g/H13-Z8sQILx"></iframe>
    </div>
  </div>

  <!-- Modal 2 -->
  <div id="iframeModal2" class="iframeModal">
    <div class="closeModal" id="closeModal2">&times;</div>
    <div class="iframe-container">
      <iframe src="https://gamea.azgame.io/mad-trails/"></iframe>
    </div>
  </div>

<script>
  function setupModal(openBtnId, modalId, closeBtnId) {
    const openBtn  = document.getElementById(openBtnId);
    const modal    = document.getElementById(modalId);
    const closeBtn = document.getElementById(closeBtnId);

    openBtn.onclick  = () => modal.style.display = "block";
    closeBtn.onclick = () => modal.style.display = "none";
    modal.onclick    = (e) => { if (e.target === modal) modal.style.display = "none"; };
  }

  setupModal("openGameBtn",  "iframeModal1", "closeModal1");
  setupModal("openGameBtn2", "iframeModal2", "closeModal2");
</script>

</body>
</html>
