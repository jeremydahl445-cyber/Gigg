<!doctype html>
<html lang="en">
<head>
<script type="text/javascript">
    (function(c,l,a,r,i,t,y){
        c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
        t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
        y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
    })(window, document, "clarity", "script", "uexksjkj4q");
</script>
<meta charset="utf-8" />
<link rel="icon" type="image/x-icon" href="favicon.ico">
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Myles</title>

<style>
  *, *::before, *::after { box-sizing: border-box; }

  html, body {
    margin: 0;
    height: 100%;
    overflow: auto;
  }

  body {
    background: url("images/55a47e7e92a6616ffefc18cf5157fcd24e55179a5bcb82884c7d28a52218ec3a24767f620d3512135169fe67f5048493a256d289e3c00d9f9efee7_1280.jpg") 
                no-repeat center center fixed;
    background-size: cover;
    font-family: Arial, sans-serif;
  }

  .canvas {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(3, calc((100vw - 40px) / 3 * 0.75));
    gap: 10px;
    padding: 10px;
    width: 100vw;
    min-height: 100vh;
  }

  .canvas img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 12px;
    display: block;
    box-shadow: 0 4px 18px rgba(0,0,0,0.35);
  }

  /* ── GAME LAUNCHER ── */
  #gameLauncher {
    position: fixed;
    bottom: 30px;
    right: 30px;
    z-index: 500;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 8px;
  }

  #toggleDropdown {
    background: rgba(255,255,255,0.15);
    color: white;
    padding: 14px 28px;
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 16px;
    backdrop-filter: blur(12px);
    font-size: 18px;
    cursor: pointer;
    transition: 0.25s ease;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  #toggleDropdown:hover { background: rgba(255,255,255,0.28); }

  #gameDropdown {
    display: none;
    flex-direction: column;
    gap: 6px;
    background: rgba(20,20,20,0.75);
    backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 14px;
    padding: 10px;
    min-width: 200px;
  }
  #gameDropdown.open { display: flex; }

  .gameOption {
    background: rgba(255,255,255,0.1);
    color: white;
    padding: 10px 16px;
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 10px;
    font-size: 15px;
    cursor: pointer;
    text-align: left;
    transition: 0.2s ease;
  }
  .gameOption:hover { background: rgba(255,255,255,0.25); }

  /* ── MODAL ── */
  .iframeModal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(4px);
    z-index: 1000;
  }

  .iframe-container {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 90%;
    height: 85%;
    background: #000;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 0 25px rgba(0,0,0,0.5);
  }

  .iframe-container iframe {
    width: 100%;
    height: 100%;
    border: none;
  }

  .closeModal {
    position: absolute;
    top: 20px;
    right: 30px;
    font-size: 40px;
    color: white;
    cursor: pointer;
    font-weight: bold;
    z-index: 1100;
    user-select: none;
  }
  .closeModal:hover { color: #ddd; }
</style>
</head>

<body>

  <div class="canvas">
    <img src="EVILDOGREAL.JPEG"           alt="Arlo">
    <img src="BUTTERDOG.JPEG"     alt="Butterdog">
    <img src="arlo.gif"           alt="Arlo gif">
    <img src="BDOGREAL.JPEG"        alt="B Dogs">
    <img src="MADDIE.JPEG"        alt="Maddie">
    <img src="CHICKEN.JPEG"       alt="Chicken">
    <img src="COOPER.JPEG"        alt="Cooper">
    <img src="EVANDOGREAL.JPEG"   alt="Evan Dog">
    <div></div>
  </div>

  <!-- Game launcher -->
  <div id="gameLauncher">
    <div id="gameDropdown"></div>
    <button id="toggleDropdown">🎮 Games ▾</button>
  </div>

  <!-- Single reusable modal -->
  <div id="gameModal" class="iframeModal">
    <div class="closeModal" id="closeGameModal">&times;</div>
    <div class="iframe-container">
      <iframe id="gameFrame" src=""></iframe>
    </div>
  </div>

<script>
  // ============================================================
  //  ADD OR REMOVE GAMES HERE — just edit this array!
  // ============================================================
  const GAMES = [
    { name: "Blackjack",    url: "https://zv1y2i8p.play.gamezop.com/g/H13-Z8sQILx" },
    { name: "Racing Game",  url: "https://gamea.azgame.io/mad-trails/"              },
    { name: "2048",         url: "https://play2048.co/"                             },
    // { name: "My New Game", url: "https://example.com/game" },  <- add more like this
  ];
  // ============================================================

  const dropdown  = document.getElementById("gameDropdown");
  const toggleBtn = document.getElementById("toggleDropdown");
  const modal     = document.getElementById("gameModal");
  const closeBtn  = document.getElementById("closeGameModal");
  const gameFrame = document.getElementById("gameFrame");

  // Build dropdown buttons from GAMES array
  GAMES.forEach(game => {
    const btn = document.createElement("button");
    btn.className   = "gameOption";
    btn.textContent = game.name;
    btn.onclick = () => {
      gameFrame.src       = game.url;
      modal.style.display = "block";
      dropdown.classList.remove("open");
    };
    dropdown.appendChild(btn);
  });

  // Toggle dropdown
  toggleBtn.onclick = (e) => {
    e.stopPropagation();
    dropdown.classList.toggle("open");
  };

  // Close modal
  closeBtn.onclick = () => { modal.style.display = "none"; gameFrame.src = ""; };
  modal.onclick    = (e) => { if (e.target === modal) { modal.style.display = "none"; gameFrame.src = ""; } };

  // Close dropdown when clicking outside
  document.addEventListener("click", () => dropdown.classList.remove("open"));
</script>

</body>
</html>
