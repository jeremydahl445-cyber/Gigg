<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Myles - Optimized</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      overflow-x: hidden;
    }

    body {
      /* Fixed: Background now covers the full screen properly */
      background: url("images/55a47e7e92a6616ffefc18cf5157fcd24e55179a5bcb82884c7d28a52218ec3a24767f620d3512135169fe67f5048493a256d289e3c00d9f9efe") no-repeat center center fixed;
      background-size: cover;
      font-family: Arial, sans-serif;
    }

    /* Optimized Grid: Adjusts columns based on screen size */
    .canvas {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
      gap: 10px;
      padding: 15px;
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
    }

    @media (min-width: 600px) {
      .canvas { grid-template-columns: repeat(3, 1fr); }
    }

    .canvas > * { aspect-ratio: 1 / 1; min-width: 0; }

    #cell-bottomright {
      position: relative;
      display: flex;
      flex-direction: column;
      border-radius: 12px;
    }

    #dragImg {
      width: 100%; height: 100%; object-fit: cover; border-radius: 12px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.35); cursor: grab; position: relative; z-index: 10;
    }

    #dragImg.dragging { cursor: grabbing; box-shadow: 0 12px 40px rgba(0,0,0,0.55); position: fixed; z-index: 9999; pointer-events: none; }

    #secretBox {
      display: none; position: absolute; inset: 0; align-items: center; justify-content: center;
      background: rgba(0,0,0,0.45); backdrop-filter: blur(6px); border-radius: 12px; z-index: 5;
    }

    #secretBox.visible { display: flex; }

    #secretInput {
      background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.35);
      border-radius: 10px; color: white; padding: 10px; width: 90%; text-align: center; outline: none;
    }

    .grid-img {
      width: 100%; height: 100%; object-fit: cover; border-radius: 12px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.35);
    }

    /* Rainbow Keyframes */
    @keyframes rainbowCycle {
      0%   { filter: hue-rotate(0deg) saturate(5) brightness(1.2) drop-shadow(0 0 15px white); }
      100% { filter: hue-rotate(360deg) saturate(5) brightness(1.2) drop-shadow(0 0 15px white); }
    }

    @keyframes spinChicken {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="canvas">
    <img class="grid-img" src="arlo.png" alt="Arlo">
    <img class="grid-img" src="BDOGREAL.JPEG" alt="Butterdog">
    <img class="grid-img" src="arlo.gif" alt="Arlo gif">
    <img class="grid-img" src="BDOGS2.JPEG" alt="B Dogs">
    <img class="grid-img" src="MADDIE.JPEG" alt="Maddie">
    <img class="grid-img" src="CHICKEN.JPEG" alt="Chicken">
    <img class="grid-img" src="COOPER.JPEG" alt="Cooper">
    <img class="grid-img" src="BENCAT1.JPEG" alt="Ben Cat 1">
    <img class="grid-img" src="BENCAT2.JPEG" alt="Ben Cat 2">
    <img class="grid-img" src="BENDOG.JPEG" alt="Ben Dog">
    <div id="cell-bottomright">
      <div id="secretBox">
        <input id="secretInput" type="text" placeholder="enter code..." autocomplete="off" />
      </div>
      <img id="dragImg" src="EVANDOGREAL.JPEG" alt="Evan Dog">
    </div>
  </div>

  <script>
    const dragImg = document.getElementById("dragImg");
    const secretBox = document.getElementById("secretBox");
    const secretInput = document.getElementById("secretInput");
    let isDragging = false;
    let startX, startY;

    dragImg.addEventListener("mousedown", (e) => {
      isDragging = true;
      const rect = dragImg.getBoundingClientRect();
      startX = e.clientX - rect.left;
      startY = e.clientY - rect.top;
      dragImg.style.width = rect.width + "px";
      dragImg.style.height = rect.height + "px";
      dragImg.classList.add("dragging");
      secretBox.classList.add("visible");
    });

    document.addEventListener("mousemove", (e) => {
      if (!isDragging) return;
      dragImg.style.left = (e.clientX - startX) + "px";
      dragImg.style.top = (e.clientY - startY) + "px";
    });

    document.addEventListener("mouseup", () => {
      isDragging = false;
      dragImg.classList.remove("dragging");
      dragImg.style.position = "relative";
      dragImg.style.left = "auto";
      dragImg.style.top = "auto";
    });

    secretInput.addEventListener("keydown", (e) => {
      if (e.key !== "Enter") return;
      const val = secretInput.value.toLowerCase().trim();
      secretInput.value = "";

      if (val === "mylesquantiscute") {
        document.querySelectorAll("img").forEach(img => {
          img.src = (img.alt === "Cooper") ? "Quant and Yahu.png" : "Screenshot 2025-11-11 195523.png";
        });
      }

      if (val === "evilmyles") {
        document.body.innerHTML = `<div style="position:fixed;inset:0;z-index:99999;background:url('Screenshot 2025-11-11 195523.png') no-repeat center center / cover;"><div style="position:absolute;inset:0;background:rgba(180,0,0,0.55);mix-blend-mode:multiply;"></div></div>`;
      }

      // Fixed: Washee & Chicken Rainbow variants logic
      if (val === "washee" || val === "lucaschicken") {
        const newImg = document.createElement("img");
        newImg.src = (val === "washee") ? "Mr._Washee_Washee.webp" : "CHICKEN-removebg-preview.png";
        newImg.style.position = "absolute";
        newImg.style.zIndex = "10000";
        
        let size = 200;
        const roll = Math.random();

        // Rainbow logic corrected for better probability distribution
        if (roll <= 0.05) { // 5% chance for Rainbow
          size = (val === "washee") ? 500 : 1000;
          newImg.style.animation = "rainbowCycle 0.5s linear infinite";
        } else if (roll <= 0.15) { // 10% chance for Gold
          size = (val === "washee") ? 250 : 650;
          newImg.style.filter = "sepia(1) saturate(10) hue-rotate(15deg) brightness(1.3) drop-shadow(0 0 10px gold)";
        }

        newImg.style.width = size + "px";
        newImg.style.left = Math.random() * (window.innerWidth - size) + "px";
        newImg.style.top = (Math.random() * (window.innerHeight - size) + window.scrollY) + "px";
        document.body.appendChild(newImg);
      }
    });
  </script>
</body>
</html>
